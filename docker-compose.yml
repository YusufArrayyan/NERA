version: '3.8'

services:
  # ─── PostgreSQL ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neuro_postgres
    environment:
      POSTGRES_USER: neuro_user
      POSTGRES_PASSWORD: neuro_pass_2026
      POSTGRES_DB: neuro_adaptive_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuro_user -d neuro_adaptive_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neuro_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuro_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://neuro_user:neuro_pass_2026@postgres:5432/neuro_adaptive_db?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: "neuro-adaptive-jwt-secret-key-2026-change-in-production"
      JWT_REFRESH_SECRET: "neuro-adaptive-refresh-secret-key-2026-change-in-production"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (Next.js) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuro_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      NEXT_PUBLIC_WS_URL: "ws://localhost:3001"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ──────────────
  nginx:
    image: nginx:alpine
    container_name: neuro_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
